server:
  port: 8088
  servlet:
    context-path: /api
spring:
  application:
    name: global_logistics
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/gl_db2
    username: hab
    password: password
    driver-class-name: org.postgresql.Driver
  flyway:
      enabled: true
      locations: classpath:db/migration
      baseline-on-migrate: true
  sql:
    init:
      mode: never  # Flyway handles schema

# Modulith verification on startup
spring.modulith:
  verification:
    enabled: true

# open api swagger produce json
springdoc:
  default-produces-media-type: application/json

# these properties need to be well organized across the different ENV
app:
  security:
    jwt:
      access-token-expiration: 90000 # 1.5 minutes
      refresh-token-expiration: 604800000 # 7 days
  cors:
    origins: ${ALLOWED_ORIGINS:http://some.com,http://localhost:4200}
  file-storage:
    path: ${FILE_PATH:./uploadedFiles}
  server:
    url: ${SERVER_URL:http://localhost:8088/api}
