<div class="flex flex-col justify-center flex-1 w-full max-w-md mx-auto">
  <div>
    <div class="mb-5 sm:mb-8">
      <h1 class="mb-2 font-semibold text-gray-800 text-title-sm dark:text-white/90 sm:text-title-md">
        Reset Password
      </h1>
      <p class="text-sm text-gray-500 dark:text-gray-400">
        We've sent a 6-digit code to <span class="font-medium text-gray-800 dark:text-white">{{ maskedPhone }}</span>
      </p>
      <p class="text-sm text-gray-500 dark:text-gray-400">
        Choose a strong password to protect your account.
      </p>
    </div>

    <form (ngSubmit)="onResetPassword()" class="space-y-6">
      <div class="flex flex-col space-y-2">
        <app-label>Verification Code <span class="text-error-500">*</span></app-label>
        
        <div class="flex justify-between gap-2 sm:gap-4" (paste)="onPaste($event)">
          @for (i of [0,1,2,3,4,5]; track i) {
            <input
              #otpInput
              type="text"
              inputmode="numeric"
              pattern="[0-9]*"
              maxlength="1"
              class="w-12 h-12 text-center text-xl font-bold border rounded-lg bg-transparent border-gray-300 dark:border-gray-700 focus:border-brand-500 focus:ring-1 focus:ring-brand-500 outline-none transition-all dark:text-white"
              (input)="onOtpInput($event, i)"
              (keydown.backspace)="onOtpDelete($event, i)"
            />
          }
        </div>
      </div>
      <div>
        <app-label>New Password <span class="text-error-500">*</span></app-label>
        <div class="relative">
          <app-input-field
            [type]="showPassword ? 'text' : 'password'"
            placeholder="Enter new password"
            [(value)]="newPassword"
            name="newPassword"
            class="form-input"
            required
          />
          <span
            (click)="togglePasswordVisibility()"
            class="absolute z-30 -translate-y-1/2 cursor-pointer right-4 top-1/2"
          >
            </span>
        </div>
      </div>

      <div>
        <app-label>Confirm Password <span class="text-error-500">*</span></app-label>
        <app-input-field
          [type]="showPassword ? 'text' : 'password'"
          placeholder="Re-enter new password"
          [(value)]="confirmPassword"
          name="confirmPassword"
          class="form-input"
          required
        />
      </div>

      <app-button
        className="w-full"
        size="sm"
        (btnClick)="onResetPassword()"
      >
        Update Password
      </app-button>
    </form>
  </div>
</div>
