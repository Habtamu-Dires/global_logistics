<div class="flex flex-col justify-center flex-1 w-full max-w-md mx-auto">
  <div>
    <div class="mb-5 sm:mb-8">
      <h1 class="mb-2 font-semibold text-gray-800 text-title-sm dark:text-white/90 sm:text-title-md">
        Forgot Password?
      </h1>
      <p class="text-sm text-gray-500 dark:text-gray-400">
        Enter your phone number and we'll send you a 6-digit confirmation code.
      </p>
    </div>

    <form (ngSubmit)="onSendOtp()" class="space-y-6">
      <div>
        <app-label>Phone Number <span class="text-error-500">*</span></app-label>
        <app-input-field
          type="tel"
          placeholder="Enter your phone number"
          [(value)]="phone"
          name="phone"
          class="form-input"
          required
        />
      </div>

      <app-button
        className="w-full"
        size="sm"
        (btnClick)="onSendOtp()"
      >
        Send OTP
      </app-button>

      <div class="text-center cursor-pointer">
        <a
          (click)="backToLogin()"
          class="text-sm font-medium text-brand-500 hover:text-brand-600 dark:text-brand-400"
        >
          Back to Sign In
        </a>
      </div>
    </form>
  </div>
</div>
